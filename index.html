<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainSTEM Inventory Finder</title>
  <style>
    :root {
      --bg: #0b57d0;
      --card: #ffffff;
      --text: #10233f;
      --muted: #5b6b82;
      --border: #dbe4f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }

    .logo {
      display: block;
      width: min(260px, 70%);
      margin: 0 auto 18px;
      border-radius: 16px;
      background: #f4f4f4;
    }
    .header {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .rice-logo {
      height: 120px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 2rem;
    }

    p.sub {
      text-align: center;
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      font-size: 1rem;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: white;
      outline: none;
    }

    select:focus {
      border-color: #6aa4ff;
      box-shadow: 0 0 0 4px rgba(11, 87, 208, 0.14);
    }

    .result {
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: #f7faff;
      border: 1px solid var(--border);
      display: none;
    }

    .result h2 {
      margin: 0 0 12px;
      font-size: 1.2rem;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-top: 1px solid #e9eef5;
    }

    .row:first-of-type { border-top: none; }

    .key {
      font-weight: 700;
    }

    .value {
      text-align: right;
    }

    .status {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .error {
      color: #9b1c1c;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="brainstem-logo.png" alt="Brainstem logo" />
      <h1>Brainstem Inventory Finder</h1>
      <p class="sub">Choose an item to see its quantity and storage section.</p>

      <label for="itemSelect">What are you looking for?</label>
      <select id="itemSelect" disabled>
        <option>Loading items...</option>
      </select>
     <div style="margin-top: 20px;">
  <label>Action</label>
  <div style="display: flex; gap: 10px;">
    <button type="button" id="depositBtn">Deposit</button>
    <button type="button" id="withdrawBtn">Withdraw</button>
  </div>

  <label style="margin-top: 15px;">Quantity</label>
  <input id="quantityInput" type="number" placeholder="Enter amount (optional)" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #dbe4f0;" />

  <button type="button" id="submitBtn" style="margin-top: 15px; width: 100%; padding: 14px; border-radius: 12px; background: #0b57d0; color: white; border: none; font-weight: bold;">
    Submit
  </button>
</div>

      <div class="result" id="resultBox">
        <h2 id="itemName">Selected item</h2>
        <div class="row">
          <div class="key">Quantity</div>
          <div class="value" id="quantityValue"></div>
        </div>
        <div class="row">
          <div class="key">Location</div>
          <div class="value" id="locationValue"></div>
        </div>
      </div>

      <div class="status" id="status">Waiting for Airtable data...</div>
    </div>
  </div>
  

 <script>
  const AIRTABLE_PAT = "patAEpJ3NzNOwDvWz.4ae6454e369898b4d2842766f24118e4cfcc2469cd0d40004341ab5f7eb48411";
  const AIRTABLE_BASE_ID = "appRiqPFAkp8uzGt7";
  const ITEMS_TABLE = "Table 1";

  const itemSelect = document.getElementById("itemSelect");
  const resultBox = document.getElementById("resultBox");
  const itemName = document.getElementById("itemName");
  const quantityValue = document.getElementById("quantityValue");
  const locationValue = document.getElementById("locationValue");
  const statusEl = document.getElementById("status");

  const depositBtn = document.getElementById("depositBtn");
  const withdrawBtn = document.getElementById("withdrawBtn");
  const quantityInput = document.getElementById("quantityInput");
  const submitBtn = document.getElementById("submitBtn");

  let inventory = [];
  let selectedAction = null;

  function toDisplayQuantity(value) {
    if (value === undefined || value === null || value === "") {
      return "Not listed";
    }
    return value;
  }

  async function airtableRequest(url, options = {}) {
    const response = await fetch(url, {
      ...options,
      headers: {
        Authorization: `Bearer ${AIRTABLE_PAT}`,
        "Content-Type": "application/json",
        ...(options.headers || {})
      }
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Airtable error ${response.status}: ${errorText}`);
    }

    return response.json();
  }

  async function loadItems() {
    statusEl.textContent = "Loading inventory...";

    try {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(ITEMS_TABLE)}`;
      const data = await airtableRequest(url);

      inventory = data.records
        .map(record => ({
          recordId: record.id,
          name: record.fields["Name"],
          quantity: record.fields["Notes"],
          location: record.fields["Location"] || "Not listed"
        }))
        .filter(item => item.name);

      populateDropdown(inventory);
      statusEl.textContent = `${inventory.length} items loaded.`;
    } catch (error) {
      console.error(error);
      statusEl.textContent = "Could not load Airtable data.";
    }
  }

  function populateDropdown(items) {
    itemSelect.innerHTML = "<option value=''>Select an item</option>";

    const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));

    sorted.forEach(item => {
      const option = document.createElement("option");
      option.value = item.recordId;
      option.textContent = item.name;
      itemSelect.appendChild(option);
    });

    itemSelect.disabled = false;
  }

  function showItem(selectedRecordId) {
    const match = inventory.find(item => item.recordId === selectedRecordId);

    if (!match) {
      resultBox.style.display = "none";
      return;
    }

    itemName.textContent = match.name;
    quantityValue.textContent = toDisplayQuantity(match.quantity);
    locationValue.textContent = match.location;
    resultBox.style.display = "block";
  }

  itemSelect.addEventListener("change", (e) => {
    showItem(e.target.value);
  });

  depositBtn.onclick = () => {
    selectedAction = "Deposit";
    depositBtn.style.background = "#0b57d0";
    depositBtn.style.color = "white";
    withdrawBtn.style.background = "";
    withdrawBtn.style.color = "";
  };

  withdrawBtn.onclick = () => {
    selectedAction = "Withdraw";
    withdrawBtn.style.background = "#0b57d0";
    withdrawBtn.style.color = "white";
    depositBtn.style.background = "";
    depositBtn.style.color = "";
  };

  submitBtn.onclick = async () => {
    const selectedRecordId = itemSelect.value;
    const quantity = Number(quantityInput.value);

    if (!selectedRecordId || !selectedAction) {
      alert("Select item and action.");
      return;
    }

    if (!quantity) {
      alert("No quantity entered — nothing done.");
      return;
    }

    const selectedItem = inventory.find(item => item.recordId === selectedRecordId);

    if (!selectedItem) {
      alert("Item not found.");
      return;
    }

    const currentQty = Number(selectedItem.quantity) || 0;
    const newQty =
      selectedAction === "Deposit"
        ? currentQty + quantity
        : currentQty - quantity;

    if (newQty < 0) {
      alert("Cannot go below 0.");
      return;
    }

    statusEl.textContent = "Updating inventory...";

    try {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(ITEMS_TABLE)}/${selectedRecordId}`;

      await airtableRequest(url, {
        method: "PATCH",
        body: JSON.stringify({
          fields: {
            "Notes": newQty
          }
        })
      });

      selectedItem.quantity = newQty;
      quantityValue.textContent = newQty;
      statusEl.textContent = "Updated successfully.";

      quantityInput.value = "";
      selectedAction = null;
      depositBtn.style.background = "";
      depositBtn.style.color = "";
      withdrawBtn.style.background = "";
      withdrawBtn.style.color = "";
    } catch (error) {
      console.error(error);
      statusEl.textContent = "Update failed.";
      alert("Error updating Airtable.");
    }
  };

  loadItems();
</script>
</body>
</html>
